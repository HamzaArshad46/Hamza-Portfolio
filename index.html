<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamza Arshad | Frontend Developer & Python Enthusiast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#6366f1', // Indigo 500
              secondary: '#a855f7', // Purple 500
              dark: '#0f172a', // Slate 900
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'fade-in-up': 'fadeInUp 1s ease-out forwards',
              'smooth-blink': 'smoothBlink 2s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              smoothBlink: {
                '0%, 100%': { opacity: '0.4', filter: 'brightness(0.7)' },
                '50%': { opacity: '1', filter: 'brightness(1.3)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #020617;
        background-image: 
          linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)),
          url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071&auto=format&fit=crop');
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        /* System cursor explicitly visible */
        cursor: default;
      }
      
      a, button, [role="button"], input, textarea, select {
        cursor: pointer;
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #475569; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6366f1; 
      }

      /* Developer Style Custom Cursor */
      .custom-cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 6px;
        height: 6px;
        background-color: #000;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        will-change: transform;
        transform: translate3d(-50%, -50%, 0);
        transition: width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
      }

      .custom-cursor-follower {
        position: fixed;
        top: 0;
        left: 0;
        width: 24px;
        height: 24px;
        border: 1px solid rgba(99, 102, 241, 0.3);
        background-color: transparent;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        will-change: transform;
        transform: translate3d(-50%, -50%, 0);
        /* Smooth follow transition */
        transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1), width 0.3s, height 0.3s, border-color 0.3s, background-color 0.3s;
      }

      /* Hover states for interactive elements */
      .cursor-hover .custom-cursor {
        width: 4px;
        height: 4px;
        background-color: #6366f1;
        border-color: #fff;
      }
      
      .cursor-hover .custom-cursor-follower {
        width: 40px;
        height: 40px;
        border-color: rgba(99, 102, 241, 0.8);
        background-color: rgba(99, 102, 241, 0.1);
      }

      /* Hide custom cursor elements on touch devices */
      @media (hover: none) and (pointer: coarse) {
        .custom-cursor, .custom-cursor-follower {
          display: none;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>

</head>

</html>
